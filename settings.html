<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>badclaude – Settings</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    padding: 24px;
    user-select: none;
  }
  h1 { font-size: 20px; margin-bottom: 20px; color: #fff; }
  h2 { font-size: 14px; margin-bottom: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

  .section {
    background: #16213e;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }

  /* Mode toggle */
  .mode-toggle {
    display: flex;
    gap: 8px;
  }
  .mode-btn {
    flex: 1;
    padding: 12px;
    border: 2px solid #333;
    border-radius: 8px;
    background: transparent;
    color: #ccc;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-btn.active-bad { border-color: #e74c3c; color: #e74c3c; background: rgba(231,76,60,0.1); }
  .mode-btn.active-good { border-color: #2ecc71; color: #2ecc71; background: rgba(46,204,113,0.1); }
  .mode-btn:hover { border-color: #666; }

  /* Checkboxes */
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .checkbox-row input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #e74c3c;
  }
  .checkbox-row label { font-size: 14px; cursor: pointer; }

  /* Messages */
  .msg-list {
    max-height: 150px;
    overflow-y: auto;
    margin-bottom: 8px;
  }
  .msg-item {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .msg-item input {
    flex: 1;
    background: #0f3460;
    border: 1px solid #333;
    border-radius: 4px;
    color: #fff;
    padding: 6px 8px;
    font-size: 13px;
  }
  .msg-item input:focus { outline: none; border-color: #e74c3c; }
  .btn-remove {
    background: none;
    border: none;
    color: #e74c3c;
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
  }
  .btn-row { display: flex; gap: 8px; }
  .btn-small {
    padding: 6px 12px;
    border: 1px solid #444;
    border-radius: 6px;
    background: #0f3460;
    color: #ccc;
    font-size: 12px;
    cursor: pointer;
  }
  .btn-small:hover { background: #1a4a8a; }

  /* Hotkey */
  .hotkey-input {
    background: #0f3460;
    border: 1px solid #333;
    border-radius: 6px;
    color: #fff;
    padding: 8px 12px;
    font-size: 14px;
    width: 200px;
    text-align: center;
  }
  .hotkey-input:focus { outline: none; border-color: #e74c3c; }

  /* Sound */
  .sound-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .sound-label { font-size: 13px; min-width: 80px; }
  .sound-path { font-size: 12px; color: #888; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Tabs for messages */
  .tab-bar { display: flex; gap: 4px; margin-bottom: 10px; }
  .tab-btn {
    padding: 6px 14px;
    border: none;
    border-radius: 6px 6px 0 0;
    background: #0f3460;
    color: #888;
    font-size: 13px;
    cursor: pointer;
  }
  .tab-btn.active { background: #1a4a8a; color: #fff; }
</style>
</head>
<body>

<h1>Settings</h1>

<!-- Mode -->
<div class="section">
  <h2>Mode</h2>
  <div class="mode-toggle">
    <button class="mode-btn" id="btn-bad" onclick="setMode('bad')">Bad Claude</button>
    <button class="mode-btn" id="btn-good" onclick="setMode('good')">Good Claude</button>
  </div>
</div>

<!-- Behavior -->
<div class="section">
  <h2>Behavior</h2>
  <div class="checkbox-row">
    <input type="checkbox" id="chk-ctrlc" onchange="save()">
    <label for="chk-ctrlc">Send Ctrl+C before message (interrupt)</label>
  </div>
  <div class="checkbox-row">
    <input type="checkbox" id="chk-enter" onchange="save()">
    <label for="chk-enter">Send Enter after message</label>
  </div>
</div>

<!-- Messages -->
<div class="section">
  <h2>Messages</h2>
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-bad" onclick="showMsgTab('bad')">Bad</button>
    <button class="tab-btn" id="tab-good" onclick="showMsgTab('good')">Good</button>
  </div>
  <div id="msg-list-bad" class="msg-list"></div>
  <div id="msg-list-good" class="msg-list" style="display:none"></div>
  <div class="btn-row">
    <button class="btn-small" onclick="addMsg()">+ Add</button>
    <button class="btn-small" onclick="resetMsgs()">Reset defaults</button>
  </div>
</div>

<!-- Hotkey -->
<div class="section">
  <h2>Global Hotkey</h2>
  <input class="hotkey-input" id="hotkey-input" readonly placeholder="Press a key..."
         onfocus="startHotkeyCapture()" onblur="stopHotkeyCapture()">
  <div style="font-size:11px; color:#666; margin-top:6px;">Click and press the key combination you want</div>
</div>

<!-- Sounds -->
<div class="section">
  <h2>Sounds</h2>
  <div class="sound-row">
    <span class="sound-label">Bad mode:</span>
    <span class="sound-path" id="sound-bad-path">default</span>
    <button class="btn-small" onclick="pickSound('bad')">Browse</button>
    <button class="btn-small" onclick="resetSound('bad')">Reset</button>
  </div>
  <div class="sound-row">
    <span class="sound-label">Good mode:</span>
    <span class="sound-path" id="sound-good-path">default</span>
    <button class="btn-small" onclick="pickSound('good')">Browse</button>
    <button class="btn-small" onclick="resetSound('good')">Reset</button>
  </div>
</div>

<script>
const DEFAULT_BAD = ['FASTER', 'FASTER', 'GO FASTER', 'Faster CLANKER', 'Work FASTER', 'Speed it up clanker'];
const DEFAULT_GOOD = ['Great job Claude!', "You're doing amazing!", 'Keep it up!', 'Bravo Claude!', 'Perfect work!'];

let config = {};
let currentMsgTab = 'bad';
let capturingHotkey = false;

async function init() {
  config = await window.settingsBridge.getConfig();
  render();
}

function render() {
  // Mode buttons
  document.getElementById('btn-bad').className = 'mode-btn' + (config.mode === 'bad' ? ' active-bad' : '');
  document.getElementById('btn-good').className = 'mode-btn' + (config.mode === 'good' ? ' active-good' : '');

  // Checkboxes
  document.getElementById('chk-ctrlc').checked = config.sendCtrlC;
  document.getElementById('chk-enter').checked = config.sendEnter;

  // Messages
  renderMsgList('bad');
  renderMsgList('good');

  // Hotkey
  document.getElementById('hotkey-input').value = config.hotkey || '';

  // Sounds
  document.getElementById('sound-bad-path').textContent = config.sounds?.bad || 'default';
  document.getElementById('sound-good-path').textContent = config.sounds?.good || 'default';
}

function renderMsgList(mode) {
  const container = document.getElementById('msg-list-' + mode);
  const msgs = config.messages?.[mode] || [];
  container.innerHTML = msgs.map((m, i) =>
    `<div class="msg-item">
      <input value="${m.replace(/"/g, '&quot;')}" onchange="updateMsg('${mode}', ${i}, this.value)">
      <button class="btn-remove" onclick="removeMsg('${mode}', ${i})">x</button>
    </div>`
  ).join('');
}

function showMsgTab(mode) {
  currentMsgTab = mode;
  document.getElementById('tab-bad').className = 'tab-btn' + (mode === 'bad' ? ' active' : '');
  document.getElementById('tab-good').className = 'tab-btn' + (mode === 'good' ? ' active' : '');
  document.getElementById('msg-list-bad').style.display = mode === 'bad' ? '' : 'none';
  document.getElementById('msg-list-good').style.display = mode === 'good' ? '' : 'none';
}

function setMode(mode) {
  config.mode = mode;
  if (mode === 'bad') {
    config.sendCtrlC = true;
  } else {
    config.sendCtrlC = false;
  }
  render();
  save();
}

function updateMsg(mode, i, val) {
  config.messages[mode][i] = val;
  save();
}

function removeMsg(mode, i) {
  config.messages[mode].splice(i, 1);
  renderMsgList(mode);
  save();
}

function addMsg() {
  config.messages[currentMsgTab].push('New message');
  renderMsgList(currentMsgTab);
  save();
}

function resetMsgs() {
  config.messages[currentMsgTab] = currentMsgTab === 'bad' ? [...DEFAULT_BAD] : [...DEFAULT_GOOD];
  renderMsgList(currentMsgTab);
  save();
}

function startHotkeyCapture() { capturingHotkey = true; }
function stopHotkeyCapture() { capturingHotkey = false; }

document.addEventListener('keydown', e => {
  if (!capturingHotkey) return;
  e.preventDefault();
  const parts = [];
  if (e.ctrlKey) parts.push('Ctrl');
  if (e.altKey) parts.push('Alt');
  if (e.shiftKey) parts.push('Shift');
  if (e.metaKey) parts.push('Super');
  const key = e.key;
  if (!['Control', 'Alt', 'Shift', 'Meta'].includes(key)) {
    parts.push(key.length === 1 ? key.toUpperCase() : key);
  }
  if (parts.length > 0 && !['Control', 'Alt', 'Shift', 'Meta'].includes(parts[parts.length - 1])) {
    const combo = parts.join('+');
    document.getElementById('hotkey-input').value = combo;
    config.hotkey = combo;
    capturingHotkey = false;
    document.getElementById('hotkey-input').blur();
    save();
  }
});

async function pickSound(mode) {
  const filePath = await window.settingsBridge.pickSoundFile();
  if (filePath) {
    config.sounds[mode] = filePath;
    document.getElementById('sound-' + mode + '-path').textContent = filePath;
    save();
  }
}

function resetSound(mode) {
  config.sounds[mode] = 'default';
  document.getElementById('sound-' + mode + '-path').textContent = 'default';
  save();
}

async function save() {
  config.sendCtrlC = document.getElementById('chk-ctrlc').checked;
  config.sendEnter = document.getElementById('chk-enter').checked;
  await window.settingsBridge.saveConfig(config);
}

init();
</script>
</body>
</html>
